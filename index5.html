<!DOCTYPE html>
<html>
<head>
    <title>Contact Us</title>
    
    <style>
        body {
            background-color: #f0f8ff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        
        .container {
            background-color: white;
            width: 90%;
            max-width: 500px;
            margin: auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }
        
        h1 {
            text-align: center;
            color: #006666;
        }
        
        label {
            display: block;
            margin: 10px 0 5px;
            color: #333;
        }
        
        input, textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #aaa;
            border-radius: 5px;
            box-sizing: border-box;
        }
        
        .radio-options {
            margin: 10px 0 20px 0;
        }
        
        .radio-options label {
            display: inline-block;
            margin-right: 30px;
        }
        
        .checkbox-div {
            margin: 20px 0;
        }
        
        button {
            background-color: #008080;
            color: white;
            padding: 12px;
            border: none;
            width: 100%;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
        }
        
        button:hover {
            background-color: #006666;
        }
        
        @media (max-width: 500px) {
            .container {
                padding: 15px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Contact Us</h1>
    
    <form id="myForm" onsubmit="sendMessage(event)">
    
        <label>First Name *</label>
        <input type="text" id="fname" required>
        
        <label>Last Name *</label>
        <input type="text" id="lname" required>
        
        <label>Email Address *</label>
        <input type="email" id="email" required>
        
        <label>Query Type *</label>
        <div class="radio-options">
            <label><input type="radio" name="type" value="general" required> General Enquiry</label>
            <label><input type="radio" name="type" value="support"> Support Request</label>
        </div>
        
        <label>Message *</label>
        <textarea id="msg" rows="6" required></textarea>
        
        <div class="checkbox-div">
            <input type="checkbox" id="agree" required>
            <label for="agree">I consent to being contacted by the team</label>
        </div>
        
        <button type="submit" id="btn">Submit</button>
    
    </form>
</div>

<script>
    function sendMessage(event) {
        event.preventDefault();
        
        let button = document.getElementById("btn");
        button.innerText = "Sending...";
        button.disabled = true;
        
        // pretend we are sending (just wait 1.5 seconds)
        setTimeout(function() {
            alert("Thank you! Your message was sent :)");
            
            // clear the form
            document.getElementById("myForm").reset();
            
            button.innerText = "Submit";
            button.disabled = false;
        }, 1500);
    }
</script>

</body>
</html>
